<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kök — Language Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f0e8;color:#1a1714;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px 20px}
.wrap{max-width:480px;width:100%}
h1{font-family:'Spectral',serif;font-size:2rem;font-weight:600;margin-bottom:6px}
.sub{font-size:.84rem;color:#6b6254;text-transform:uppercase;letter-spacing:.08em;margin-bottom:36px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{display:block;background:#faf7f2;border:1px solid #d4cfc4;border-radius:10px;padding:20px 22px;text-decoration:none;color:inherit;transition:all .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.turkish::before{background:#2d5a8e}
.card.dari::before{background:#1D9E75}
.card.uzbek::before{background:#8e4a2d}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-flag{font-size:1.4rem;margin-bottom:8px}
.card-name{font-family:'Spectral',serif;font-size:1.15rem;font-weight:600;margin-bottom:3px}
.card.turkish .card-name{color:#2d5a8e}
.card.dari .card-name{color:#1D9E75}
.card.uzbek .card-name{color:#8e4a2d}
.card-level{font-size:.76rem;color:#9e9488;text-transform:uppercase;letter-spacing:.07em}
.card-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:1.2rem;color:#d4cfc4}
.footer{margin-top:28px;font-size:.78rem;color:#9e9488;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1>Kök</h1>
  <p class="sub">Three-Language Practice System</p>
  <div class="cards">
    <a class="card turkish" href="turkish-practice.html">
      <div class="card-flag">🔵</div>
      <div class="card-name">Turkish</div>
      <div class="card-level">B1 → B2 · Daily life in Turkey</div>
      <span class="card-arrow">→</span>
    </a>
    <a class="card dari" href="dari-practice.html">
      <div class="card-flag">🌿</div>
      <div class="card-name">Dari</div>
      <div class="card-level">A2+ → B1 · Afghan Dari</div>
      <span class="card-arrow">→</span>
    </a>
    <a class="card uzbek" href="uzbek-practice.html">
      <div class="card-flag">🟠</div>
      <div class="card-name">Afghan Uzbek</div>
      <div class="card-level">A2 → B1 · Afghan dialect</div>
      <span class="card-arrow">→</span>
    </a>
  </div>
  <p class="footer">Each app will ask for your Anthropic API key once.<br>It saves to your browser and is never shared.</p>
</div>
</body>
</html>
